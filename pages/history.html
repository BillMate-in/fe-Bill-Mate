<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>BillMate - Riwayat</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/history.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e2e2e2",
                        "surface": "#f9f9f9",
                        "on-primary-container": "#7A4318",
                        "on-primary": "#ffffff",
                        "primary-container": "#E98A3A",
                        "surface-container-low": "#f3f3f4",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#E7CCBA",
                        "primary": "#B8651C",
                        "secondary": "#5f5e5e",
                        "on-surface": "#1a1c1c",
                        "primary-fixed": "#FBE3D0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "custom": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "xl": "32px",
                        "container-max": "1200px",
                        "sm": "8px",
                        "2xl": "48px",
                        "margin-mobile": "16px",
                        "md": "16px",
                        "xs": "4px",
                        "3xl": "64px",
                        "gutter": "16px",
                        "margin-desktop": "32px",
                        "lg": "24px"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-surface flex flex-col min-h-screen">

    <header class="bg-[#F59E57] text-white fixed top-0 left-0 right-0 z-50 px-3 shadow-md">
        <div class="w-full max-w-[1200px] mx-auto py-2 px-md flex justify-between items-center h-16">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined"
                    style="font-size: 28px; font-variation-settings: 'FILL' 1;">receipt_long</span>
                <span class="font-inter font-bold text-xl">BillMate</span>
            </div>
            <div class="flex items-center gap-2">
                <nav class="hidden md:flex gap-4 mr-6">
                    <a class="text-sm font-semibold text-white hover:opacity-80 flex items-center gap-1 transition-transform active:scale-95"
                        href="index.html">
                        <span class="material-symbols-outlined text-[20px]">home</span>
                        <span>Beranda</span>
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-[1200px] mx-auto px-margin-mobile md:px-margin-desktop pt-24 pb-md">

        <div class="mb-lg px-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-md">
            <div>
                <div class="flex items-center gap-sm mb-xs">
                    <span class="material-symbols-outlined text-primary-container text-4xl"
                        style="font-variation-settings: 'FILL' 1;">history</span>
                    <h1 class="text-2xl font-bold text-on-surface mb-0">Riwayat Room</h1>
                </div>
                <p class="text-sm text-secondary mt-1">Lihat kembali riwayat pembagian tagihan makan kamu</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-md mb-lg px-2">
            <div class="md:col-span-8 relative">
                <span
                    class="material-symbols-outlined absolute text-secondary left-4 top-1/2 -translate-y-1/2">search</span>
                <input
                    class="w-full pl-12 pr-md py-3 rounded-xl border border-surface-variant bg-surface-container-lowest text-sm outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container"
                    placeholder="Cari room..." type="text">
            </div>
            <div class="md:col-span-4 flex items-center">
                <div class="flex gap-sm overflow-x-auto pb-1 w-full no-scrollbar">
                    <button id="allBtn"
                        class="active-pill px-4 py-2 rounded-xl text-sm font-semibold whitespace-nowrap shadow-sm transition-transform active:scale-95">Semua</button>
                    <button id="weekBtn"
                        class="bg-surface-container-lowest border border-surface-variant text-secondary px-4 py-2 rounded-xl text-sm font-semibold whitespace-nowrap hover:bg-surface-container-low transition-all">7
                        Hari</button>
                    <button id="monthBtn"
                        class="bg-surface-container-lowest border border-surface-variant text-secondary px-4 py-2 rounded-xl text-sm font-semibold whitespace-nowrap hover:bg-surface-container-low transition-all">30
                        Hari</button>
                    <button id="deleteAllBtn"
                        class="flex items-center gap-xs px-md py-sm bg-red-50 hover:bg-red-100 text-red-600 rounded-2xl text-sm font-semibold shadow-sm transition-all active:scale-95">
                        <span class="material-symbols-outlined text-lg">delete_sweep</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="historyList" class="flex flex-col gap-sm px-2"></div>

        <div class="mt-xl flex justify-center items-center gap-md">
            <button id="prevPage"
                class="border border-surface-variant rounded-full flex items-center justify-center text-secondary w-10 h-10 hover:bg-surface-container-low transition-all active:scale-95">
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <span id="pageInfo" class="text-sm font-semibold text-on-surface">Page 1 of 1</span>
            <button id="nextPage"
                class="border border-surface-variant rounded-full flex items-center justify-center text-secondary w-10 h-10 hover:bg-surface-container-low transition-all active:scale-95">
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </div>
    </main>

    <footer class="bg-[#F59E57] text-white border-t border-orange-400 transition-colors mt-3xl">
        <div class="w-full max-w-[1200px] mx-auto py-md px-md">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-md items-center">
                <div class="text-center md:text-left">
                    <div class="flex items-center gap-xs justify-center md:justify-start mb-1">
                        <span class="material-symbols-outlined"
                            style="font-variation-settings: 'FILL' 1;">receipt_long</span>
                        <span class="font-bold">BillMate</span>
                    </div>
                    <p class="text-xs opacity-80">&copy; 2026 BillMate. All rights reserved.</p>
                </div>
                <div class="flex justify-center md:justify-end gap-lg text-xs">
                    <a class="hover:underline" href="#">Privacy Policy</a>
                    <a class="hover:underline" href="#">Terms of Service</a>
                    <a class="hover:underline" href="#">Help Center</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="../js/history.js"></script>
</body>

</html>
