<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/createroom.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#c5c6c8",
                        "inverse-on-surface": "#f0f1f1",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#5f5e5e",
                        "surface-dim": "#dadada",
                        "secondary-fixed": "#e5e2e1",
                        "primary-container": "#ff7a00",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-surface": "#1a1c1c",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-tint": "#994700",
                        "tertiary-fixed": "#e1e2e4",
                        "surface-variant": "#e2e2e2",
                        "primary": "#994700",
                        "surface-container-highest": "#e2e2e2",
                        "on-background": "#1a1c1c",
                        "on-tertiary-container": "#343739",
                        "error": "#ba1a1a",
                        "secondary-container": "#e2dfde",
                        "on-secondary": "#ffffff",
                        "tertiary": "#5c5f60",
                        "background": "#f9f9f9",
                        "outline": "#8c7263",
                        "on-primary-fixed-variant": "#753400",
                        "on-primary-fixed": "#321200",
                        "on-secondary-container": "#636262",
                        "surface-container": "#eeeeee",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#9ea0a2",
                        "surface-container-low": "#f3f3f4",
                        "on-tertiary-fixed": "#191c1e",
                        "on-secondary-fixed-variant": "#474746",
                        "on-primary-container": "#5c2800",
                        "primary-fixed": "#ffdbc8",
                        "outline-variant": "#e0c0af",
                        "on-surface-variant": "#584235",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f9f9f9",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#2f3131",
                        "primary-fixed-dim": "#ffb68b",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface": "#f9f9f9",
                        "inverse-primary": "#ffb68b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "8px",
                        "xl": "12px",
                        "2xl": "16px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "2xl": "48px",
                        "3xl": "64px",
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "gutter": "16px",
                        "base": "4px",
                        "sm": "8px",
                        "xl": "32px",
                        "lg": "24px",
                        "xs": "4px",
                        "container-max": "1200px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">

    <header class="bg-surface dark:bg-surface-dim shadow-sm sticky top-0 z-50">
        <nav class="flex justify-between items-center px-margin-desktop py-4 max-w-container-max mx-auto w-full">
            <div
                class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-container cursor-pointer active:scale-95 transition-transform">
                QRoom
            </div>
        </nav>
    </header>

    <main
        class="flex-grow flex items-center justify-center px-margin-mobile py-2xl bg-surface relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
            <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container rounded-full blur-[120px]"></div>
            <div class="absolute top-1/2 -right-24 w-64 h-64 bg-secondary-container rounded-full blur-[100px]"></div>
        </div>

        <div class="w-full max-w-[480px] z-10">
            <div class="text-center mb-xl">
                <h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Create a New Room</h1>
                <p class="font-body-md text-body-md text-secondary">Set up your group order and invite your friends.</p>
            </div>

            <div
                class="bg-surface-container-lowest border border-outline-variant shadow-md rounded-2xl p-xl transition-all duration-300 hover:shadow-lg">
                <form action="#" class="space-y-lg">
                    <div class="space-y-sm">
                        <label class="font-label-md text-label-md text-secondary block ml-1" for="host-name">Host
                            Name</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary group-focus-within:text-primary transition-colors">person</span>
                            <input
                                class="w-full pl-12 pr-md py-4 bg-surface border border-surface-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-tertiary"
                                id="host-name" placeholder="e.g., Aditya" required="" type="text">
                        </div>
                    </div>

                    <div class="space-y-sm">
                        <label class="font-label-md text-label-md text-secondary block ml-1" for="restaurant">Restaurant
                            Name</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary group-focus-within:text-primary transition-colors">restaurant</span>
                            <input
                                class="w-full pl-12 pr-md py-4 bg-surface border border-surface-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-tertiary"
                                id="restaurant" placeholder="e.g., Bakso Pak Kirno" required="" type="text">
                        </div>
                    </div>

                    <div class="space-y-sm">
                        <label class="font-label-md text-label-md text-secondary block ml-1" for="rekening">
                            Nomor Rekening
                        </label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary">
                                account_balance
                            </span>
                            <input id="rekening" type="text" placeholder="e.g., 123456789"
                                class="w-full pl-12 pr-md py-4 bg-surface border border-surface-variant rounded-lg">
                        </div>
                    </div>

                    <div class="flex items-center gap-sm bg-primary-fixed text-on-primary-fixed p-md rounded-xl">
                        <span class="material-symbols-outlined text-primary"
                            style="font-variation-settings: 'FILL' 1;">info</span>
                        <span class="font-label-sm text-label-sm">Only you can finalize the order as the host.</span>
                    </div>

                    <div class="pt-md space-y-md">
                        <button id="btnCreateRoom"
                            class="w-full py-4 bg-primary-container text-on-primary-container rounded-2xl font-label-md text-lg shadow-md hover:shadow-lg hover:opacity-95 active:scale-[0.98] transition-all flex justify-center items-center gap-sm"
                            type="button">
                            <span>Create & Start Ordering</span>
                            <span class="material-symbols-outlined">rocket_launch</span>
                        </button>

                        <a class="w-full flex items-center justify-center gap-xs py-2 text-secondary font-label-md hover:text-primary transition-all group"
                            href="index.html">
                            <span
                                class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">
                                arrow_back
                            </span>
                            <span>Go Back</span>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer
        class="bg-surface-container-lowest dark:bg-surface-container-low border-t border-surface-variant dark:border-on-surface-variant transition-colors">
        <div
            class="flex flex-col md:flex-row justify-between items-center w-full px-md py-lg gap-md max-w-container-max mx-auto">
            <div class="flex flex-col items-center md:items-start">
                <span class="font-label-md text-label-md font-bold text-primary mb-1">QRoom</span>
                <p class="font-label-sm text-label-sm text-secondary dark:text-on-secondary-fixed-variant">© 2026 QRoom.
                    All rights reserved.</p>
            </div>
            <div class="flex gap-lg">
                <a class="font-label-sm text-label-sm text-secondary dark:text-on-secondary-fixed-variant hover:text-primary dark:hover:text-primary-fixed transition-colors"
                    href="#">Privacy Policy</a>
                <a class="font-label-sm text-label-sm text-secondary dark:text-on-secondary-fixed-variant hover:text-primary dark:hover:text-primary-fixed transition-colors"
                    href="#">Terms of Service</a>
                <a class="font-label-sm text-label-sm text-secondary dark:text-on-secondary-fixed-variant hover:text-primary dark:hover:text-primary-fixed transition-colors"
                    href="#">Help Center</a>
            </div>
        </div>
    </footer>

    <script src="js/createroom.js"></script>
</body>

</html>
